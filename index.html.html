     <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Toji Fushiguro</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        background: radial-gradient(circle at center, #1a1a1a, #000);
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: Arial, sans-serif;
        overflow: hidden;
    }

    .container {
        text-align: center;
        color: white;
        animation: fadeIn 2s ease-in-out;
    }

    h1 {
        font-size: 40px;
        letter-spacing: 2px;
        text-shadow: 0 0 10px #00ffcc, 0 0 20px #00ffcc;
        animation: glow 2s infinite alternate;
    }

    img {
        width: 320px;
        border-radius: 12px;
        margin-top: 20px;
        box-shadow: 0 0 20px #00ffcc;
        transition: transform 0.4s ease, box-shadow 0.4s ease;
    }

    img:hover {
        transform: scale(1.08);
        box-shadow: 0 0 40px #00ffcc;
    }

    p {
        margin-top: 15px;
        font-size: 16px;
        color: #ccc;
    }

    @keyframes glow {
        from {
            text-shadow: 0 0 10px #00ffcc;
        }
        to {
            text-shadow: 0 0 25px #00ffcc, 0 0 40px #00ffcc;
        }
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    /* floating particles */
    .particle {
        position: absolute;
        width: 4px;
        height: 4px;
        background: #00ffcc;
        border-radius: 50%;
        opacity: 0.7;
        animation: float 6s infinite linear;
    }

    @keyframes float {
        from {
            transform: translateY(100vh);
        }
        to {
            transform: translateY(-10vh);
        }
    }
</style>
</head>

<body>

<div class="container">
    <h1>TOJI FUSHIGURO</h1>
    <img src="https://i.imgur.com/your-image-link.jpg" alt="Toji Fushiguro">
    <p>The Sorcerer Killer ⚔️</p>
</div>

<!-- particles -->
<script>
    for (let i = 0; i < 30; i++) {
        let p = document.createElement("div");
        p.className = "particle";
        p.style.left = Math.random() * 100 + "vw";
        p.style.animationDuration = (3 + Math.random() * 5) + "s";
        document.body.appendChild(p);
    }
</script>

</body>
</html>
